name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  XCODE_VERSION: '26.4'
  SCHEME: 'CCManager'
  PROJECT: 'CCManager.xcodeproj'
  HOMEBREW_TAP_REPO: 'zwmmm/homebrew-tap'
  HOMEBREW_CASK_PATH: 'Casks/ccmanager.rb'

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List Xcodes
        run: ls /Applications | grep Xcode

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Build CCManagerCLI
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme CCManagerCLI \
            -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Package App
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent CCManager.app CCManager.app.zip

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -R build/Build/Products/Release/CCManager.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "CCManager" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            CCManager-${{ github.ref_name }}.dmg
          rm -rf dmg_temp

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccmanager-dmg
          path: CCManager-${{ github.ref_name }}.dmg

      - name: Generate Appcast
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          from email.utils import format_datetime
          from pathlib import Path
          import hashlib
          import os
          import re

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          project = Path("project.yml").read_text()
          build = re.search(r'CURRENT_PROJECT_VERSION:\s*"([^"]+)"', project).group(1)
          notes = Path("release-notes.md").read_text().replace("]]>", "]]]]><![CDATA[>")
          zip_path = Path("build/Build/Products/Release/CCManager.app.zip")
          sha256 = hashlib.sha256(zip_path.read_bytes()).hexdigest()
          length = zip_path.stat().st_size
          pub_date = format_datetime(datetime.now(timezone.utc))
          download_url = f"https://github.com/zwmmm/CCManager/releases/download/{tag}/CCManager.app.zip"

          Path("build/appcast.xml").write_text(f'''<?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>CCManager Updates</title>
                  <link>https://github.com/zwmmm/CCManager/releases</link>
                  <description>CCManager update feed</description>
                  <language>zh-cn</language>
                  <item>
                      <title>CCManager {version}</title>
                      <description><![CDATA[{notes}]]></description>
                      <pubDate>{pub_date}</pubDate>
                      <enclosure
                          url="{download_url}"
                          sparkle:version="{build}"
                          sparkle:shortVersionString="{version}"
                          sparkle:sha256="{sha256}"
                          length="{length}"
                          type="application/octet-stream"
                      />
                      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                  </item>
              </channel>
          </rss>
          ''')
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CCManager-${{ github.ref_name }}.dmg
            build/Build/Products/Release/CCManager.app.zip
            build/Build/Products/Release/ccmanager
            build/appcast.xml
          body_path: ${{ github.workspace }}/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-homebrew-tap:
    needs: build-and-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Download DMG Artifact
        uses: actions/download-artifact@v4
        with:
          name: ccmanager-dmg

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Update Cask
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          DMG_FILE="CCManager-${TAG}.dmg"
          DMG_SHA256="$(sha256sum "${DMG_FILE}" | awk '{print $1}')"
          CASK_FILE="homebrew-tap/${HOMEBREW_CASK_PATH}"

          export VERSION DMG_SHA256 CASK_FILE

          python3 - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          sha256 = os.environ["DMG_SHA256"]
          cask_file = pathlib.Path(os.environ["CASK_FILE"])
          original = cask_file.read_text()
          updated = original

          replacements = [
              (r'version "[^"]+"', f'version "{version}"'),
              (r'sha256 "[^"]+"', f'sha256 "{sha256}"'),
              (
                  r'url "[^"]+"',
                  f'url "https://github.com/zwmmm/CCManager/releases/download/v#{{version}}/CCManager-v#{{version}}.dmg"',
              ),
          ]

          for pattern, replacement in replacements:
              updated, count = re.subn(pattern, replacement, updated, count=1)
              if count != 1:
                  raise SystemExit(f"failed to update pattern: {pattern}")

          if updated == original:
              print("Cask already up to date")
          else:
              cask_file.write_text(updated)
              print(f"Updated {cask_file}")
          PY

      - name: Commit and Push Tap Update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No Homebrew tap changes to commit"
            exit 0
          fi

          git add "${HOMEBREW_CASK_PATH}"
          git commit -m "ccmanager ${GITHUB_REF_NAME#v}"
          git push
