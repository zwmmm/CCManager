name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  XCODE_VERSION: '16.4'
  SCHEME: 'CCManager'
  PROJECT: 'CCManager.xcodeproj'

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Package App
        run: |
          cd build/Build/Products/Release
          zip -r CCManager-${{ github.ref_name }}.zip CCManager.app

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -R build/Build/Products/Release/CCManager.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "CCManager" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            CCManager-${{ github.ref_name }}.dmg
          rm -rf dmg_temp

      - name: Extract Release Notes from Appcast
        run: |
          # Extract <description> content from docs/appcast.xml
          # Supports both CDATA and plain text description tags
          DESCRIPTION=$(sed -n 's/.*<description>\(<!\[CDATA\[\(.*\)\]\]>\|[^<]*\)<\/description>.*/\2/p' docs/appcast.xml | tr -d '\n')
          echo "$DESCRIPTION" > release-body.md
          echo "Extracted release notes (${#DESCRIPTION} chars)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CCManager-${{ github.ref_name }}.dmg
            build/Build/Products/Release/CCManager-${{ github.ref_name }}.zip
          body_path: release-body.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
