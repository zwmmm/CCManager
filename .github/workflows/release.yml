name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  XCODE_VERSION: '16.4'
  SCHEME: 'CCManager'
  PROJECT: 'CCManager.xcodeproj'

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Package App
        run: |
          cd build/Build/Products/Release
          zip -r CCManager-${{ github.ref_name }}.zip CCManager.app

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -R build/Build/Products/Release/CCManager.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "CCManager" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            CCManager-${{ github.ref_name }}.dmg
          rm -rf dmg_temp

      - name: Download Sparkle Tools
        run: |
          SPARKLE_VERSION="2.6.0"
          curl -L -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          tar -xf sparkle.tar.xz

      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Error: SPARKLE_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "$SPARKLE_PRIVATE_KEY" | ./bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/zwmmm/CCManager/releases/download/${{ github.ref_name }}/" \
            -o docs/appcast.xml \
            build/Build/Products/Release/

      - name: Inject Release Notes
        run: |
          # Read release-notes.md content
          RELEASE_NOTES=$(cat release-notes.md)
          # Escape special characters for XML
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          # Insert description tag into appcast.xml <item>
          sed -i '' 's|</item>|  <description><![CDATA['"${RELEASE_NOTES}"']]></description>\
          </item>|' docs/appcast.xml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CCManager-${{ github.ref_name }}.dmg
            build/Build/Products/Release/CCManager-${{ github.ref_name }}.zip
            docs/appcast.xml
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
