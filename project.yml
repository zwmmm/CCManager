name: CCManager
options:
  bundleIdPrefix: com.ccmanager
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: CCManager
    MARKETING_VERSION: "1.3.3"
    CURRENT_PROJECT_VERSION: "10"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_TEAM_ID: UY3VY8BA83
    ENABLE_HARDENED_RUNTIME: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"
  Down:
    url: https://github.com/johnxnguyen/Down.git
    from: "0.11.0"

targets:
  CCManager:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/MingcuteClaudeFill.png
        buildPhase: resources
      - Resources/Assets.xcassets
    resources:
      - Resources/Info.plist
      - Resources/CCManager.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/CCManager.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SQLite
        product: SQLite
      - package: Sparkle
        product: Sparkle
      - package: Down
        product: Down
