name: CCManager
options:
  bundleIdPrefix: com.ccmanager
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: CCManager
    MARKETING_VERSION: "1.9.1"
    CURRENT_PROJECT_VERSION: "26"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.0"
  Down:
    url: https://github.com/johnxnguyen/Down.git
    from: "0.11.0"

targets:
  CCManager:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - CCManagerCLI/**
      - path: Sources/Shared
        buildPhase: sources
      - path: Resources/MingcuteClaudeFill.png
        buildPhase: resources
      - Resources/Assets.xcassets
    resources:
      - Resources/Info.plist
      - Resources/CCManager.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/CCManager.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SQLite
        product: SQLite
      - package: Down
        product: Down

  CCManagerCLI:
    type: tool
    platform: macOS
    sources:
      - path: Sources/CCManagerCLI
      - path: Sources/Shared
      - path: Sources/Models
    settings:
      base:
        PRODUCT_NAME: ccmanager
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: SQLite
        product: SQLite

  CCManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CCManagerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: CCManagerTests
    dependencies:
      - target: CCManager

schemes:
  CCManager:
    build:
      targets:
        CCManager: all
    test:
      targets:
        - CCManagerTests
  CCManagerCLI:
    build:
      targets:
        CCManagerCLI: all
