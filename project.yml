name: CCManager
options:
  bundleIdPrefix: com.ccmanager
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: CCManager
    MARKETING_VERSION: "1.4.1"
    CURRENT_PROJECT_VERSION: "18"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"
  Down:
    url: https://github.com/johnxnguyen/Down.git
    from: "0.11.0"

targets:
  CCManager:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/MingcuteClaudeFill.png
        buildPhase: resources
      - Resources/Assets.xcassets
    resources:
      - Resources/Info.plist
      - Resources/CCManager.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/CCManager.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SQLite
        product: SQLite
      - package: Sparkle
        product: Sparkle
      - package: Down
        product: Down
    postBuildScripts:
      - name: "Re-sign embedded frameworks for ad-hoc signing"
        script: |
          set +e
          FRAMEWORKS_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Frameworks"
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              [ -d "$framework" ] || continue
              codesign --force --sign - "$framework" 2>/dev/null
              for binary in "${framework}/Versions/"*/*; do
                [ -f "$binary" ] && codesign --force --sign - "$binary" 2>/dev/null
              done
            done
          fi
          # Re-sign binaries in MacOS directory (e.g., __preview.dylib from SwiftUI previews)
          MACOS_BIN_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/MacOS"
          if [ -d "$MACOS_BIN_DIR" ]; then
            for binary in "$MACOS_BIN_DIR"/*; do
              [ -f "$binary" ] && codesign --force --sign - "$binary" 2>/dev/null
            done
          fi
          codesign --force --sign - "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"

schemes:
  CCManager:
    build:
      targets:
        CCManager: all
